# wechat-prompt-context 默认配置

# 默认设置
defaults:
  theme: "pie"           # 默认发布主题
  articleType: "story"   # 默认文章类型
  highlight: "github"    # 默认代码高亮

# 文章类型映射
articleTypes:
  story:
    name: "故事型"
    description: "适合情感、人物、经历类文章"
    template: "story.md"
  analysis:
    name: "分析型"
    description: "适合商业、科技、趋势分析"
    template: "analysis.md"
  list:
    name: "清单型"
    description: "适合干货、攻略、方法论"
    template: "list.md"
  opinion:
    name: "观点型"
    description: "适合评论、观点、思考"
    template: "opinion.md"
  tech-report:
    name: "科技深度报道"
    description: "适合科技产品、商业模式、创业故事的深度报道"
    template: "tech-report.md"
  marketing-trend:
    name: "消费趋势·品牌营销"
    description: "适合消费洞察、品牌案例、营销趋势、人群分析的深度文章"
    template: "marketing-trend.md"
  investigation:
    name: "深度调查报道·社会纪实"
    description: "适合事故调查、政策后遗症、边缘群体、环境灾难、职业纪实、城乡变迁的深度调查"
    template: "investigation.md"
  cinema-culture:
    name: "影视评论·文化分析"
    description: "适合票房现象解读、类型片研究、文化基因分析、影视产业观察的深度评论"
    template: "cinema-culture.md"
  lifestyle-healing:
    name: "生活方式·心灵疗愈"
    description: "适合独处美学、社交边界、心理疗愈、人生哲学、反内卷的生活方式随笔"
    template: "lifestyle-healing.md"
  edu-course:
    name: "教育类课程推广"
    description: "适合知识付费、课程营销、亲子教育、素质教育、研学旅行的软文推广"
    template: "edu-course.md"
  industry-evolution:
    name: "行业趋势·职业演进"
    description: "适合职业消亡预警、技术变革分析、岗位演进史、新职业定义、组织能力重构"
    template: "industry-evolution.md"

# 发布主题列表（来自wechat-toolkit）
themes:
  builtin:
    - pie          # 简洁优雅，默认推荐
    - lapis        # 深蓝配色，专业感
    - orangeheart  # 暖橙色调，活力感
    - rainbow      # 彩虹渐变，活泼感
    - maize        # 玉米黄，温暖感
    - purple       # 紫色调，神秘感
    - phycat       # 物理猫，科技感
    - default      # 简约默认
  custom:
    - aurora       # 极光渐变，视觉冲击
    - newsroom     # 报纸风格，严肃感
    - sage         # 清新自然，绿色调
    - ember        # 暖色调，温馨感

# 代码高亮主题
highlights:
  - github
  - github-dark
  - atom-one-dark
  - atom-one-light
  - dracula
  - monokai
  - solarized-dark
  - solarized-light
  - xcode

# LLM配置
llm:
  model: "kimi-k2.5"
  maxTokens: 4096
  temperature: 1  # Moonshot只支持temperature=1

# 搜索配置
search:
  xiaohongshu:
    enabled: true
    maxResults: 5
  zhihu:
    enabled: true
    maxResults: 5
  wechat:
    enabled: true
    maxResults: 5
